<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Резюме студента</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page" data-page="resume">
    <header class="topbar">
      <div class="container topbar-row">
        <a class="brand" href="/">Job Board</a>
        <nav class="nav">
          <a href="/">Вакансии</a>
          <a href="/applications.html">Мои отклики</a>
          <a href="/resume.html">Резюме</a>
          <span id="user-label"></span>
          <button id="logout-button" style="display: none;">Выйти</button>
        </nav>
      </div>
    </header>
    <main class="container section">
      <div id="page-message" class="message"></div>
      <div class="grid">
        <form id="resume-form" class="form-card">
          <h1>Резюме студента</h1>
          <label for="summary">О себе</label>
          <textarea id="summary"></textarea>
          <label for="experience">Опыт</label>
          <textarea id="experience"></textarea>
          <label for="education">Образование</label>
          <textarea id="education"></textarea>
          <label for="skills">Навыки</label>
          <input id="skills" type="text" placeholder="HTML, CSS, jQuery" />
          <button type="submit">Сохранить резюме</button>
        </form>
        <div id="resume-preview"></div>
      </div>
    </main>
    <script src="/vendor/jquery.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
