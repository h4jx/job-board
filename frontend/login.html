<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page" data-page="login">
    <header class="topbar">
      <div class="container topbar-row">
        <a class="brand" href="/">Job Board</a>
        <nav class="nav">
          <a href="/">Вакансии</a>
          <a href="/register-student.html">Регистрация студента</a>
          <a href="/register-company.html">Регистрация компании</a>
          <span id="user-label"></span>
          <button id="logout-button" style="display: none;">Выйти</button>
        </nav>
      </div>
    </header>
    <main class="container section">
      <form id="login-form" class="form-card">
        <h1>Вход</h1>
        <div id="page-message" class="message"></div>
        <div id="demo-accounts" class="demo-box muted">Загрузка демо-аккаунтов...</div>
        <label for="email">Электронная почта</label>
        <input id="email" type="email" placeholder="Введите электронную почту" />
        <label for="password">Пароль</label>
        <input id="password" type="password" placeholder="Введите пароль" />
        <button type="submit">Войти</button>
      </form>
    </main>
    <script src="/vendor/jquery.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
